name: Build & Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which jobs to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - github
          - gitee

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read version from tauri.conf.json
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-${{ steps.version.outputs.tag }}
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
          if-no-files-found: error

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

  github-release:
    needs: build
    if: inputs.target == 'all' || inputs.target == 'github'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-${{ needs.build.outputs.tag }}
          path: artifacts

      - name: Generate GitHub latest.json
        run: |
          bun run generate_updater_manifest --artifact-dir artifacts --version "${{ needs.build.outputs.version }}" --tag "${{ needs.build.outputs.tag }}" --release-base-url "https://github.com/tarnishablec/league-jax-releases/releases/download"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          repository: tarnishablec/league-jax-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ needs.build.outputs.tag }}
          name: League Jax ${{ needs.build.outputs.tag }}
          draft: false
          prerelease: false
          files: artifacts/*
          fail_on_unmatched_files: true

  gitee-release:
    needs: build
    if: inputs.target == 'all' || inputs.target == 'gitee'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: tauri-build-${{ needs.build.outputs.tag }}
          path: artifacts

      - name: Delete Existing Gitee Release
        uses: nICEnnnnnnnLee/action-gitee-release@master
        continue-on-error: true
        with:
          gitee_action: delete_release
          gitee_owner: tarnishablec
          gitee_repo: league-jax-releases
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_tag_name: ${{ needs.build.outputs.tag }}

      - name: Generate Gitee latest.json
        run: |
          bun run generate_updater_manifest --artifact-dir artifacts --version "${{ needs.build.outputs.version }}" --tag "${{ needs.build.outputs.tag }}" --release-base-url "https://gitee.com/tarnishablec/league-jax-releases/releases/download"

      - name: Publish to Gitee
        uses: nICEnnnnnnnLee/action-gitee-release@master
        with:
          gitee_action: create_release
          gitee_owner: tarnishablec
          gitee_repo: league-jax-releases
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_tag_name: ${{ needs.build.outputs.tag }}
          gitee_release_name: League Jax ${{ needs.build.outputs.tag }}
          gitee_release_body: Release ${{ needs.build.outputs.tag }}
          gitee_target_commitish: master
          gitee_files: |
            artifacts/*
          gitee_upload_retry_times: 3
