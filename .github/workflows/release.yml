name: Build & Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which jobs to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - github
          - gitee

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read version from tauri.conf.json
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-${{ steps.version.outputs.tag }}
          path: |
            target/release/bundle/nsis/*.exe
          if-no-files-found: error

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

  github-release:
    needs: build
    if: inputs.target == 'all' || inputs.target == 'github'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: tauri-build-${{ needs.build.outputs.tag }}
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: tarnishablec/league-jax-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ needs.build.outputs.tag }}
          name: League Jax ${{ needs.build.outputs.tag }}
          draft: false
          prerelease: false
          files: artifacts/*
          fail_on_unmatched_files: true

  gitee-release:
    needs: build
    if: inputs.target == 'all' || inputs.target == 'gitee'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: tauri-build-${{ needs.build.outputs.tag }}
          path: artifacts

      - name: Create Gitee Release & upload assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          REPO_API="https://gitee.com/api/v5/repos/tarnishablec/league-jax-releases"

          # Resolve default branch
          DEFAULT_BRANCH=$(curl -fsS \
            "${REPO_API}?access_token=${GITEE_TOKEN}" \
            | jq -r '.default_branch')
          echo "Default branch: $DEFAULT_BRANCH"

          # Always remove the existing release for this tag before creating a new one.
          EXISTING_RESPONSE=$(curl -sS -w '\n%{http_code}' \
            "${REPO_API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
          EXISTING_HTTP_CODE=$(echo "$EXISTING_RESPONSE" | tail -n1)
          EXISTING_BODY=$(echo "$EXISTING_RESPONSE" | sed '$d')
          EXISTING_RELEASE_ID=$(echo "$EXISTING_BODY" | jq -r '.id // empty')

          if [ "$EXISTING_HTTP_CODE" -ge 200 ] && [ "$EXISTING_HTTP_CODE" -lt 300 ] && [ -n "$EXISTING_RELEASE_ID" ] && [ "$EXISTING_RELEASE_ID" != "null" ]; then
            echo "Deleting existing Gitee release for ${TAG} (ID: $EXISTING_RELEASE_ID) ..."
            DELETE_RESPONSE=$(curl -sS -w '\n%{http_code}' -X DELETE \
              "${REPO_API}/releases/${EXISTING_RELEASE_ID}?access_token=${GITEE_TOKEN}")
            DELETE_HTTP_CODE=$(echo "$DELETE_RESPONSE" | tail -n1)
            DELETE_BODY=$(echo "$DELETE_RESPONSE" | sed '$d')

            if [ "$DELETE_HTTP_CODE" -lt 200 ] || [ "$DELETE_HTTP_CODE" -ge 300 ]; then
              echo "::error::Failed to delete existing Gitee release for ${TAG}: $DELETE_BODY"
              exit 1
            fi

            # Gitee may take a moment to fully remove the tag-release association.
            for _ in 1 2 3 4 5; do
              VERIFY_RESPONSE=$(curl -sS -w '\n%{http_code}' \
                "${REPO_API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
              VERIFY_HTTP_CODE=$(echo "$VERIFY_RESPONSE" | tail -n1)
              if [ "$VERIFY_HTTP_CODE" -eq 404 ]; then
                break
              fi
              sleep 2
            done
          elif [ "$EXISTING_HTTP_CODE" -ne 404 ]; then
            echo "::error::Failed to query existing Gitee release for ${TAG}: $EXISTING_BODY"
            exit 1
          fi

          # Create a fresh release for this tag.
          CREATE_RESPONSE=$(curl -sS -w '\n%{http_code}' -X POST \
            "${REPO_API}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"League Jax ${TAG}\",
              \"body\": \"Release ${TAG}\",
              \"target_commitish\": \"${DEFAULT_BRANCH}\"
            }")

          CREATE_HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -n1)
          CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')

          RELEASE_ID=$(echo "$CREATE_BODY" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::error::Failed to create Gitee release (HTTP ${CREATE_HTTP_CODE}): $CREATE_BODY"
            exit 1
          fi
          echo "Created Gitee release ID: $RELEASE_ID"

          FILES=(artifacts/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No artifacts found to upload."
            exit 1
          fi

          # Upload each artifact
          for FILE in "${FILES[@]}"; do
            FILENAME=$(basename "$FILE")
            echo "Uploading $FILENAME ..."
            UPLOAD_RESPONSE=$(curl -fsS -X POST \
              "${REPO_API}/releases/${RELEASE_ID}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE}")

            ASSET_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.browser_download_url')
            if [ "$ASSET_URL" = "null" ] || [ -z "$ASSET_URL" ]; then
              echo "::error::Failed to upload $FILENAME: $UPLOAD_RESPONSE"
              exit 1
            fi
            echo "Uploaded: $ASSET_URL"
          done
